<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share The Word!</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app">

        <div class="overlayLink hidden" id="overlayLink">
          <h1 id="linkHeader">
            Session started!</h1>
          <button id="copyBtn">
            Click to copy link ~
          </button>
        </div>

        <div class="overlay hidden" id="overlayMenu">

    <!-- <div class="search-container">
        <search>
            <form id="searchBar" class="searchBar" action="/search" method="GET">
                <input 
                    type="search" 
                    id="searchInput" 
                    name="q" 
                    class="search-input" 
                    placeholder="Search" 
                    aria-label="Search through site content"
                    required
                >
            </form>
        </search>
    </div> -->

            <div id="overlayHeader">
            <button id="menuClose">
                <i data-lucide="x"></i>
            </button>
            </div>
            <select id="translationSelect"></select>
            <select id="bookSelect"></select>
            <select id="chapterSelect"></select>
            <select id="verseSelect"></select>
            <button id="themeBtn">Dark Mode</button>
            <button id="sessionBtn">Start session</button>
            <div id="sliderContainer">
                <p id="fontText">Font Size </p>
                <input
                    type="range"
                    id="fontSizing"
                    min="0"
                    max="4"
                    step="1"
                    value="1"
                  />

                </div>
        </div>

      <header class="topbar">

        <div class="selectors hidden" id="selectorsHeader">
        </div>



        <div class="chapter-header" id="chapterHeader">
          <button id="backBtn" aria-label="Previous Chapter">
            <i data-lucide="chevron-left"></i>
          </button>

          <button id="headerBtn"></button>

          <button id="nextBtn" aria-label="Next Chapter">
            <i data-lucide="chevron-right"></i>
          </button>
        </div>

      </header>

      <main class="reader">

        <article id="chapter">   
          <div class="verses" id="verses">
            </div>
        </article>

      </main>

      <div id="leaveModal" class="modal hidden">
          <div class="modal-content">
              <p>Are you sure you want to leave the session?</p>

              <div class="modal-actions">
                  <button id="confirmLeaveBtn">Leave</button>
                  <button id="cancelLeaveBtn">Cancel</button>
              </div>
          </div>
      </div>
    </div>
  <script src="/socket.io/socket.io.js"></script>
  <!-- <script src="script.js" defer></script>   -->
  <script type="module" src="/init.js"></script>
  <script>lucide.createIcons();</script>
 </body>
</html>
